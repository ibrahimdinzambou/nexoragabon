[build]
  publish = "src/main/resources/static"

[[redirects]]
  from = "/api/*"
  to = "https://nexora-api-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/actuator/*"
  to = "https://nexora-api-production.up.railway.app/actuator/:splat"
  status = 200
  force = true
