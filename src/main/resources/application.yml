server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework: INFO

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: iptv-saas-api
  datasource:
    url: jdbc:h2:file:./data/iptv-saas;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  mvc:
    async:
      request-timeout: 0
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:true}
            required: ${MAIL_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SSL:false}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:5000}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  public:
    site-url: ${PUBLIC_SITE_URL:https://nexoragabon.com}
    api-base-url: ${PUBLIC_API_BASE_URL:https://api.nexoragabon.com}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  mail:
    from-address: ${MAIL_FROM_ADDRESS:${MAIL_USERNAME:noreply@nexoragabon.com}}
    from-name: ${MAIL_FROM_NAME:Nexora}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
      endpoint: ${SENDGRID_API_ENDPOINT:https://api.sendgrid.com/v3/mail/send}
      timeout-ms: ${SENDGRID_TIMEOUT_MS:15000}
    async:
      core-pool-size: ${MAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${MAIL_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${MAIL_ASYNC_QUEUE_CAPACITY:100}
  seed:
    super-admin-email: ${SUPER_ADMIN_EMAIL:alexandredinzambou@gmail.com}
    super-admin-name: ${SUPER_ADMIN_NAME:Alexandre Dinzambou}
    super-admin-password: ${SUPER_ADMIN_PASSWORD:}
  alerts:
    enabled: ${APP_ALERTS_ENABLED:${TELEGRAM_ALERTS_ENABLED:false}}
    health-interval-ms: ${APP_HEALTH_ALERT_INTERVAL_MS:900000}
    health-initial-delay-ms: ${APP_HEALTH_ALERT_INITIAL_DELAY_MS:60000}
  security:
    token-ttl-hours: ${TOKEN_TTL_HOURS:168}
    require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:true}
    email-otp-ttl-minutes: ${EMAIL_OTP_TTL:15}
    two-factor-code-ttl-minutes: ${TWO_FACTOR_CODE_TTL:10}
  billing:
    default-trial-plan: ${DEFAULT_TRIAL_PLAN:free}
    default-trial-days: ${DEFAULT_TRIAL_DAYS:7}
    payment-request-expires-hours: ${PAYMENT_REQUEST_EXPIRES_HOURS:24}
  iptv:
    cache-ttl-seconds: ${IPTV_CACHE_TTL:900}
    m3u-cache-directory: ${IPTV_M3U_CACHE_DIRECTORY:./data/m3u-cache}
    m3u-cache-max-age-hours: ${IPTV_M3U_CACHE_MAX_AGE_HOURS:168}
    m3u-max-playlist-bytes: ${IPTV_M3U_MAX_PLAYLIST_BYTES:134217728}
    m3u-read-timeout-seconds: ${IPTV_M3U_READ_TIMEOUT_SECONDS:180}
    xtream-cache-directory: ${IPTV_XTREAM_CACHE_DIRECTORY:./data/xtream-cache}
    xtream-cache-max-age-hours: ${IPTV_XTREAM_CACHE_MAX_AGE_HOURS:168}
    xtream-timeout-seconds: ${IPTV_XTREAM_TIMEOUT_SECONDS:45}
    xtream-max-response-bytes: ${IPTV_XTREAM_MAX_RESPONSE_BYTES:134217728}
    image-proxy-max-bytes: ${IPTV_IMAGE_PROXY_MAX_BYTES:8388608}
    image-proxy-cache-items: ${IPTV_IMAGE_PROXY_CACHE_ITEMS:256}
    heartbeat-timeout-seconds: ${IPTV_HEARTBEAT_TIMEOUT_SECONDS:90}
    session-cleanup-interval-ms: ${IPTV_SESSION_CLEANUP_INTERVAL_MS:30000}
    proxy-range-chunk-bytes: ${IPTV_PROXY_RANGE_CHUNK_BYTES:4194304}
    proxy-connect-timeout-seconds: ${IPTV_PROXY_CONNECT_TIMEOUT_SECONDS:15}
    proxy-request-timeout-seconds: ${IPTV_PROXY_REQUEST_TIMEOUT_SECONDS:30}
    proxy-first-byte-timeout-seconds: ${IPTV_PROXY_FIRST_BYTE_TIMEOUT_SECONDS:15}
    health-audit-enabled: ${IPTV_HEALTH_AUDIT_ENABLED:true}
    health-audit-cron: ${IPTV_HEALTH_AUDIT_CRON:0 0 0 * * *}
    health-audit-zone: ${IPTV_HEALTH_AUDIT_ZONE:Africa/Lagos}
    health-disable-after-failures: ${IPTV_HEALTH_DISABLE_AFTER_FAILURES:3}
    vlc-path: ${IPTV_VLC_PATH:}
    vlc-startup-timeout-seconds: ${IPTV_VLC_STARTUP_TIMEOUT_SECONDS:45}
  addons:
    max-response-bytes: ${ADDON_MAX_RESPONSE_BYTES:2097152}
    cache-ttl-seconds: ${ADDON_CACHE_TTL_SECONDS:300}
    allow-private-hosts: ${ADDON_ALLOW_PRIVATE_HOSTS:false}
    torbox:
      api-token: ${TORBOX_API_TOKEN:}
      base-url: ${TORBOX_API_BASE_URL:https://api.torbox.app}
      allowed-download-hosts: ${TORBOX_ALLOWED_DOWNLOAD_HOSTS:.torbox.app,.tb-cdn.io}
      max-wait-seconds: ${TORBOX_MAX_WAIT_SECONDS:90}
      poll-interval-millis: ${TORBOX_POLL_INTERVAL_MILLIS:2000}
    stremio-porn:
      manifest-url: ${STREMIO_PORN_ADDON_URL:}
      allowed-stream-hosts: ${STREMIO_PORN_ALLOWED_STREAM_HOSTS:*}
  consumet:
    enabled: ${CONSUMET_ENABLED:false}
    base-url: ${CONSUMET_BASE_URL:}
    movie-provider: ${CONSUMET_MOVIE_PROVIDER:flixhq}
    anime-provider: ${CONSUMET_ANIME_PROVIDER:hianime}
    movie-server: ${CONSUMET_MOVIE_SERVER:vidcloud}
    anime-server: ${CONSUMET_ANIME_SERVER:vidstreaming}
    anime-category: ${CONSUMET_ANIME_CATEGORY:dub}
    source-mode: ${CONSUMET_SOURCE_MODE:auto}
    meta-provider: ${CONSUMET_META_PROVIDER:zoro}
    embed-source: ${CONSUMET_EMBED_SOURCE:hd-2}
    embed-player-url: ${CONSUMET_EMBED_PLAYER_URL:}
    other-embed-player-url: ${CONSUMET_OTHER_EMBED_PLAYER_URL:}
    timeout-seconds: ${CONSUMET_TIMEOUT_SECONDS:20}
    max-response-bytes: ${CONSUMET_MAX_RESPONSE_BYTES:2097152}
    allowed-stream-hosts: ${CONSUMET_ALLOWED_STREAM_HOSTS:}
  eporner:
    enabled: ${EPORNER_ENABLED:true}
    base-url: ${EPORNER_API_BASE_URL:https://www.eporner.com/api/v2}
    timeout-seconds: ${EPORNER_TIMEOUT_SECONDS:20}
    max-response-bytes: ${EPORNER_MAX_RESPONSE_BYTES:4194304}
    max-per-page: ${EPORNER_MAX_PER_PAGE:60}
    cache-ttl-seconds: ${EPORNER_CACHE_TTL_SECONDS:300}
    default-order: ${EPORNER_DEFAULT_ORDER:latest}
  tmdb:
    api-key: ${TMDB_API_KEY:}
    read-access-token: ${TMDB_READ_ACCESS_TOKEN:${TMDB_API_READ_ACCESS_TOKEN:}}
    base-url: ${TMDB_API_BASE_URL:https://api.themoviedb.org/3}
    image-base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p}
    language: ${TMDB_LANGUAGE:fr-FR}
    region: ${TMDB_REGION:FR}
    include-adult: ${TMDB_INCLUDE_ADULT:false}
    timeout-seconds: ${TMDB_TIMEOUT_SECONDS:12}
    max-response-bytes: ${TMDB_MAX_RESPONSE_BYTES:2097152}
  reelshort:
    base-url: ${REELSHORT_API_BASE_URL:https://captain.sapimu.au/reelshort/api/v1}
    auth-token: ${REELSHORT_AUTH_TOKEN:}
    default-language: ${REELSHORT_DEFAULT_LANGUAGE:in}
    timeout-seconds: ${REELSHORT_TIMEOUT_SECONDS:15}
    max-response-bytes: ${REELSHORT_MAX_RESPONSE_BYTES:2097152}
  dramas:
    base-url: ${DRAMA_API_BASE_URL:http://127.0.0.1:5000/api/v1/reelshort}
    timeout-seconds: ${DRAMA_API_TIMEOUT_SECONDS:20}
  telegram:
    alerts:
      enabled: ${TELEGRAM_ALERTS_ENABLED:false}
      bot-token: ${TELEGRAM_ALERTS_BOT_TOKEN:${TELEGRAM_BOT_TOKEN:}}
      chat-id: ${TELEGRAM_ALERTS_CHAT_ID:${TELEGRAM_CHAT_ID:}}
      iptv-alerts-enabled: ${TELEGRAM_IPTV_ALERTS_ENABLED:true}
      iptv-alert-interval-ms: ${TELEGRAM_IPTV_ALERT_INTERVAL_MS:300000}
      iptv-alert-initial-delay-ms: ${TELEGRAM_IPTV_ALERT_INITIAL_DELAY_MS:30000}
      iptv-expiry-alert-days: ${TELEGRAM_IPTV_EXPIRY_ALERT_DAYS:7}
      iptv-saturation-threshold-percent: ${TELEGRAM_IPTV_SATURATION_THRESHOLD_PERCENT:90}
    activity:
      enabled: ${TELEGRAM_ACTIVITY_ALERTS_ENABLED:${TELEGRAM_ALERTS_ENABLED:false}}
      login-alerts-enabled: ${TELEGRAM_LOGIN_ALERTS_ENABLED:true}
      failed-login-alerts-enabled: ${TELEGRAM_FAILED_LOGIN_ALERTS_ENABLED:true}
      password-alerts-enabled: ${TELEGRAM_PASSWORD_ALERTS_ENABLED:true}
    digest:
      enabled: ${TELEGRAM_DAILY_DIGEST_ENABLED:${TELEGRAM_ALERTS_ENABLED:false}}
      cron: ${TELEGRAM_DAILY_DIGEST_CRON:0 0 22 * * *}
      zone: ${TELEGRAM_DAILY_DIGEST_ZONE:Africa/Lagos}
    admin:
      enabled: ${TELEGRAM_ADMIN_ENABLED:${TELEGRAM_PANEL_ENABLED:false}}
      bot-token: ${TELEGRAM_ADMIN_BOT_TOKEN:}
      chat-id: ${TELEGRAM_ADMIN_CHAT_ID:}
      allowed-chat-ids: ${TELEGRAM_ADMIN_ALLOWED_CHAT_IDS:${TELEGRAM_ADMIN_CHAT_ID:}}
      readonly-chat-ids: ${TELEGRAM_ADMIN_READONLY_CHAT_IDS:}
      chat-roles: ${TELEGRAM_ADMIN_CHAT_ROLES:}
      poll-interval-ms: ${TELEGRAM_ADMIN_POLL_INTERVAL_MS:3000}
      poll-initial-delay-ms: ${TELEGRAM_ADMIN_POLL_INITIAL_DELAY_MS:5000}

---
spring:
  config:
    activate:
      on-profile: postgres
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:iptv_saas}}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
  h2:
    console:
      enabled: false
