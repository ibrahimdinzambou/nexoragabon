spring:
  datasource:
    url: jdbc:h2:mem:iptv-saas-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  mail:
    host: localhost
    port: 1025

app:
  security:
    require-email-verification: true
  telegram:
    enabled: false

logging:
  level:
    root: WARN
