spring:
  datasource:
    url: jdbc:h2:mem:iptv_saas_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: true
  mail:
    host: localhost
    port: 1025

app:
  addons:
    allow-private-hosts: true
  iptv:
    session-cleanup-interval-ms: 3600000
  telegram:
    enabled: false

management:
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework: INFO
