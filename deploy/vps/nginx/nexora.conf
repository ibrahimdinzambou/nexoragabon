map $http_origin $anime_nexora_cors_origin {
    default "";
    ~^https://(www\.)?nexoragabon\.com$ $http_origin;
}

map $http_origin $api_cors_origin {
    default "";
    ~^https://(www\.)?nexoragabon\.com$ $http_origin;
}

map $http_origin $content_nexora_cors_origin {
    default "";
    ~^https://(www\.)?nexoragabon\.com$ $http_origin;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexoragabon.com www.nexoragabon.com api.nexoragabon.com;

    client_max_body_size 128m;

    location /drama-api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    location /anime-api/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 180;
        proxy_send_timeout 180;

        add_header Access-Control-Allow-Origin $anime_nexora_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        add_header Access-Control-Allow-Origin $api_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Accept, Content-Type, Origin, X-Requested-With" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

# Content-Nexora est expose sur un sous-domaine dedie car son lecteur utilise
# les chemins absolus / et /api/.
server {
    listen 80;
    listen [::]:80;
    server_name content.nexoragabon.com;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        add_header Access-Control-Allow-Origin $content_nexora_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Origin" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
